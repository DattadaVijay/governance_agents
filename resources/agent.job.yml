resources:
  jobs:
    governance_job: 
      name: "Governance Agent Pipeline"

      tasks:
        - task_key: deploy_agent
          notebook_task:
            notebook_path: ../src/agent.py

        - task_key: register_model
          depends_on:
            - task_key: deploy_agent
          notebook_task:
            notebook_path: ../src/model_register.py